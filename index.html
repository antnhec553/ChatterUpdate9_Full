<script>
document.addEventListener("DOMContentLoaded", () => {

  // Media elements
  const video1 = document.querySelector("#vid1"); // Flap 7
  const video2 = document.querySelector("#vid2"); // Flap 9
  const audio1 = document.querySelector("#aud1"); // Flap 8

  // Target entities
  const target7 = document.querySelector('[mindar-image-target="targetIndex: 6"]');
  const target8 = document.querySelector('[mindar-image-target="targetIndex: 7"]');
  const target9 = document.querySelector('[mindar-image-target="targetIndex: 8"]');

  // 🔓 Unlock all media on first tap (required for mobile)
  document.body.addEventListener("click", () => {
    [video1, video2, audio1].forEach(media => {
      media.play().then(() => {
        media.pause();
        media.currentTime = 0;
      }).catch(err => {
        console.log("Media unlock error:", err);
      });
    });
  }, { once: true });

  // ▶️ FLAP 7 VIDEO
  target7.addEventListener("targetFound", () => {
    video1.play();
  });
  target7.addEventListener("targetLost", () => {
    video1.pause();
  });

  // ▶️ FLAP 8 AUDIO
  target8.addEventListener("targetFound", () => {
    audio1.play();
  });
  target8.addEventListener("targetLost", () => {
    audio1.pause();
  });

  // ▶️ FLAP 9 VIDEO
  target9.addEventListener("targetFound", () => {
    video2.play();
  });
  target9.addEventListener("targetLost", () => {
    video2.pause();
  });

});

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

<style>
html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
}

a-scene {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<a-scene
mindar-image="imageTargetSrc: targets.mind;"
embedded
device-orientation-permission-ui="enabled">

<a-assets>

<!-- Images -->
<img id="img1" src="images/flap1.jpg">
<img id="img2" src="images/flap2.jpg">
<img id="img3" src="images/flap3.jpg">
<img id="img4" src="images/flap4.jpg">
<img id="img5" src="images/flap5.jpg">
<img id="img6" src="images/flap6.jpg">

<!-- Videos -->
<video id="vid1" src="videos/flap7.mp4" preload="auto" loop muted playsinline webkit-playsinline></video>
<video id="vid2" src="videos/flap9.mp4" preload="auto" loop muted playsinline webkit-playsinline></video>

<!-- Audio -->
<audio id="aud1" src="audio/flap8.wav" loop></audio>

</a-assets>

<a-camera position="0 0 0"></a-camera>

<!-- FLAPS 1-6: Images -->
<a-entity mindar-image-target="targetIndex: 0">
  <a-text value="EDIT TEXT" color="yellow" align="center" position="0 0.8 0" scale="2 2 2"></a-text>
  <a-plane src="#img1" width="1.4" height="1"></a-plane>
</a-entity>

<a-entity mindar-image-target="targetIndex: 1">
  <a-text value="EDIT TEXT" color="cyan" align="center" position="0 0.8 0" scale="2 2 2"></a-text>
  <a-plane src="#img2" width="1.4" height="1"></a-plane>
</a-entity>

<a-entity mindar-image-target="targetIndex: 2">
  <a-text value="EDIT TEXT" color="pink" align="center" position="0 0.8 0" scale="2 2 2"></a-text>
  <a-plane src="#img3" width="1.4" height="1"></a-plane>
</a-entity>

<a-entity mindar-image-target="targetIndex: 3">
  <a-text value="EDIT TEXT" color="orange" align="center" position="0 0.8 0" scale="2 2 2"></a-text>
  <a-plane src="#img4" width="1.4" height="1"></a-plane>
</a-entity>

<a-entity mindar-image-target="targetIndex: 4">
  <a-text value="EDIT TEXT" color="green" align="center" position="0 0.8 0" scale="2 2 2"></a-text>
  <a-plane src="#img5" width="1.4" height="1"></a-plane>
</a-entity>

<a-entity mindar-image-target="targetIndex: 5">
  <a-text value="EDIT TEXT" color="red" align="center" position="0 0.8 0" scale="2 2 2"></a-text>
  <a-plane src="#img6" width="1.4" height="1"></a-plane>
</a-entity>

<!-- FLAP 7: Video -->
<a-entity mindar-image-target="targetIndex: 6">
 <a-plane material="src: #vid1" width="1.4" height="1"></a-plane>
</a-entity>

<!-- FLAP 8: Audio -->
<a-entity mindar-image-target="targetIndex: 7">
  <a-text value="AUDIO FLAP" color="white" align="center" position="0 0.8 0" scale="2 2 2"></a-text>
  <a-plane color="black" width="1.4" height="1"></a-plane>
</a-entity>

<!-- FLAP 9: Video -->
<a-entity mindar-image-target="targetIndex: 8">
  <a-plane material="src: #vid2" width="1.4" height="1"></a-plane>
</a-entity>

</a-scene>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const video1 = document.querySelector("#vid1"); // flap 7
  const video2 = document.querySelector("#vid2"); // flap 9

  const target7 = document.querySelector('[mindar-image-target="targetIndex: 6"]');
  const target9 = document.querySelector('[mindar-image-target="targetIndex: 8"]');

  // 🔓 unlock videos on first tap (REQUIRED for mobile)
  document.body.addEventListener("click", () => {
    video1.play().then(() => {
      video1.pause();
      video1.currentTime = 0;
    });

    video2.play().then(() => {
      video2.pause();
      video2.currentTime = 0;
    });
  }, { once: true });

  // ▶️ FLAP 7 VIDEO
  target7.addEventListener("targetFound", () => {
    video1.play();
  });

  target7.addEventListener("targetLost", () => {
    video1.pause();
  });

  // ▶️ FLAP 9 VIDEO
  target9.addEventListener("targetFound", () => {
    video2.play();
  });

  target9.addEventListener("targetLost", () => {
    video2.pause();
  });

});
</script>

</body>
</html>
